<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Daily Gas Receipt Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800&family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2F4F7;
    --paper-2:#E6E9EE;
    --ink:#1F2937;
    --ink-soft:#64748B;
    --brass:#2F6FE0;
    --brass-dark:#1D4ED8;
    --green:#2E9C4C;
    --red:#DC3545;
    --line:#DFE3E8;
    --panel:#111827;
    --radius:8px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--paper);
    background-image:
      linear-gradient(var(--paper-2) 1px, transparent 1px),
      linear-gradient(90deg, var(--paper-2) 1px, transparent 1px);
    background-size:22px 22px;
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  header{ padding:22px 18px 14px 62px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  header h1{
    font-family:'Archivo',sans-serif; font-weight:800;
    font-size:22px; margin:0; letter-spacing:-.01em;
  }
    .topbar{
    background:var(--panel); color:#fff; display:flex; align-items:center; gap:12px;
    padding:12px 16px; position:sticky; top:0; z-index:40;
  }
  .topbar-logo{ height:26px; width:auto; display:block; }
  .topbar-title{
    font-family:'Archivo',sans-serif; font-weight:800; font-size:15px;
    letter-spacing:-.01em; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .menu-btn{
    width:34px; height:34px; border-radius:8px; border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.06); display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0;
  }
  .menu-btn svg{ width:18px; height:18px; stroke:#fff; }
  .sidebar-overlay{
    position:fixed; inset:0; background:rgba(10,14,20,.55); z-index:60;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .sidebar-overlay.show{ opacity:1; pointer-events:auto; }
  .sidebar{
    position:fixed; top:0; left:0; bottom:0; width:250px; max-width:78vw;
    background:var(--panel); z-index:70; transform:translateX(-100%);
    transition:transform .25s ease; box-shadow:3px 0 20px rgba(0,0,0,.35);
    display:flex; flex-direction:column;
  }
  .sidebar.show{ transform:translateX(0); }
  .sidebar-header{
    padding:22px 18px; display:flex; align-items:center; gap:10px;
    border-bottom:1px solid rgba(255,255,255,.08); position:relative;
  }
  .sidebar-header img{ height:30px; width:auto; display:block; }
  .sidebar-header span{
    color:#fff; font-family:'Archivo',sans-serif; font-weight:800; font-size:12.5px;
    letter-spacing:.02em; line-height:1.25;
  }
  .sidebar-nav{ padding:14px 12px; flex:1; overflow-y:auto; }
  .sidebar a{
    display:block; padding:12px 12px; border-radius:8px; margin-bottom:4px;
    font-family:'Inter',sans-serif; font-weight:600; font-size:14.5px;
    color:rgba(255,255,255,.72); text-decoration:none; border-left:3px solid transparent;
  }
  .sidebar a.active{
    background:rgba(255,255,255,.08); color:#fff; border-left:3px solid var(--brass);
    font-weight:700;
  }
  .sidebar a:not(.active):active{ background:rgba(255,255,255,.05); }
  .sidebar-close{
    position:absolute; top:18px; right:14px; width:26px; height:26px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    color:rgba(255,255,255,.6); font-size:17px;
  }
  .back-link{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--brass-dark);
    text-decoration:none; font-weight:600; white-space:nowrap;
  }

  main{ padding:0 14px; max-width:520px; margin:0 auto; }

  .card{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:14px;
  }
  .card h2{
    font-family:'Archivo',sans-serif; font-size:13px; font-weight:800;
    text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft);
    margin:0 0 12px;
  }

  .field{ margin-bottom:12px; }
  .field:last-child{ margin-bottom:0; }
  .field label{
    display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft);
    margin-bottom:5px;
  }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  input[type=date], input[type=time], input[type=text], input[type=number]{
    width:100%; padding:12px 12px; border:1.5px solid var(--line);
    border-radius:10px; font-size:16px; font-family:'IBM Plex Mono',monospace;
    background:#FBFBF9; color:var(--ink);
  }
  input[type=text]{ font-family:'Inter',sans-serif; font-size:15px; }
  input:focus{ outline:none; border-color:var(--brass); }

  .imgs{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .imgs-1col{ grid-template-columns:1fr; }
  .imgs-1col .shot{ aspect-ratio:16/10; }
  .shot{
    position:relative; aspect-ratio:1/1; border-radius:10px; overflow:hidden;
    border:1.5px dashed var(--line); background:#FBFBF9;
    display:flex; align-items:center; justify-content:center;
  }
  .shot.filled{ border-style:solid; border-color:var(--brass); }
  .shot img{ width:100%; height:100%; object-fit:cover; display:block; }
  .shot input{ position:absolute; inset:0; opacity:0; cursor:pointer; }
  .shot .hint{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    color:var(--ink-soft); font-size:11px; font-weight:600;
    text-transform:uppercase; letter-spacing:.06em; pointer-events:none;
    text-align:center; padding:0 6px;
  }
  .shot .hint svg{ width:22px; height:22px; stroke:var(--brass-dark); }
  .shot .tag{
    position:absolute; top:6px; left:6px; background:rgba(27,36,29,.72);
    color:#fff; font-family:'IBM Plex Mono',monospace; font-size:9.5px;
    padding:2px 6px; border-radius:5px; pointer-events:none; max-width:85%;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .shot .clear{
    position:absolute; top:6px; right:6px; width:22px; height:22px;
    background:rgba(27,36,29,.72); border-radius:50%; color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:14px;
    z-index:2;
  }

  button.submit{
    width:100%; padding:15px; border:none; border-radius:12px;
    background:var(--brass); color:#FFFFFF; font-family:'Archivo',sans-serif;
    font-weight:800; font-size:15px; letter-spacing:.02em; cursor:pointer;
    margin-top:4px;
  }
  button.submit:active{ background:var(--brass-dark); }
  button.submit:disabled{ background:#C7D1E0; color:#7C8AA0; }

  .msg{
    text-align:center; font-size:13px; font-weight:600; padding:10px;
    border-radius:10px; margin-bottom:14px; display:none;
  }
  .msg.show{ display:block; }
  .msg.ok{ background:#E4F1E7; color:var(--green); }
  .msg.err{ background:#F6E4E2; color:var(--red); }

  .edit-banner{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:#EAF0FE; border:1px solid var(--brass); border-radius:10px;
    padding:10px 12px; margin-bottom:14px; font-size:12.5px; font-weight:600;
    color:var(--brass-dark);
  }
  .edit-banner button{
    background:none; border:1px solid var(--brass-dark); color:var(--brass-dark);
    border-radius:8px; padding:4px 10px; font-size:11.5px; font-weight:700;
    cursor:pointer; white-space:nowrap;
  }

  .entry{
    padding:10px 0; border-bottom:1px solid var(--line); font-size:12.5px;
  }
  .entry:last-child{ border-bottom:none; }
  .entry .top{ display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; color:var(--ink-soft); margin-bottom:3px; }
  .entry .company{ font-weight:700; }
  .empty-hint{ color:var(--ink-soft); font-size:13px; text-align:center; padding:8px 0; }
  .refresh{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--brass-dark);
    background:none; border:none; float:right; cursor:pointer; font-weight:600;
  }

  /* Summary popup modal */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,14,20,.6); z-index:80;
    display:none; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.show{ display:flex; }
  .modal-box{
    background:#fff; border-radius:16px 16px 0 0; padding:20px 18px 24px;
    width:100%; max-width:520px; max-height:85vh; overflow-y:auto;
  }
  .modal-box h3{
    font-family:'Archivo',sans-serif; font-weight:800; font-size:16px;
    margin:0 0 14px; color:var(--ink);
  }
  .modal-row{ display:flex; justify-content:space-between; font-size:13.5px; padding:6px 0; border-bottom:1px solid var(--line); }
  .modal-row span:first-child{ color:var(--ink-soft); }
  .modal-row span:last-child{ font-weight:700; }
  .modal-imgs{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:14px 0; }
  .modal-imgs img{ width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:8px; border:1px solid var(--line); }
  .line-btn{
    width:100%; padding:13px; border:none; border-radius:10px;
    background:#06C755; color:#fff; font-family:'Archivo',sans-serif;
    font-weight:800; font-size:14.5px; cursor:pointer; margin-top:14px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .modal-close-btn{
    width:100%; padding:12px; border:1.5px solid var(--line); border-radius:10px;
    background:#fff; color:var(--ink-soft); font-family:'Inter',sans-serif;
    font-weight:700; font-size:13.5px; cursor:pointer; margin-top:8px;
  }
</style>
</head>

<script>
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');

function closeSidebar(){ sidebar.classList.remove('show'); sidebarOverlay.classList.remove('show'); }

const GAS_URL = "https://script.google.com/macros/s/AKfycbzFwNJc2PqCmZwNLBRo5guB1KUxsS4GFEttPNuSGMvDISZg6hNAumQaJO-1SneZlOCR6g/exec";

document.getElementById('date').valueAsDate = new Date();

// ---------- image capture slots ----------
const DOC_SLOT = { key: 'docImg', label: 'รูปเอกสาร' };
const SLOTS = [
  { key: 'sealImg1', label: 'รูปซีล 1' },
  { key: 'sealImg2', label: 'รูปซีล 2' },
  { key: 'pressureGaugeImg', label: 'รูปเกจวัดแรงดันที่รถ' },
  { key: 'truckGaugeImg', label: 'รูปเกจเบาท์' },
  { key: 'densityImg', label: 'รูปวัด Density' },
  { key: 'tempImg', label: 'รูปวัดอุณหภูมิ' },
  { key: 'pressureReadingImg', label: 'รูปวัดแรงดัน' }
];
const ALL_SLOTS = [DOC_SLOT, ...SLOTS];
const imageData = {};

function slotHTML(i, label){
  return `
  <div class="shot" id="shot${i}">
    <span class="tag">${label}</span>
    <input type="file" accept="image/*" id="file${i}">
    <div class="hint" id="hint${i}">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a2 2 0 0 1 2-2h1.2a2 2 0 0 0 1.66-.9l.7-1.1A2 2 0 0 1 11.2 3h1.6a2 2 0 0 1 1.64.9l.7 1.1a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8Z"/><circle cx="12" cy="13" r="3.2"/></svg>
      <span>ถ่ายรูป</span>
    </div>
  </div>`;
}
document.getElementById('docImgWrap').insertAdjacentHTML('beforeend', slotHTML(0, DOC_SLOT.label));
const imgsWrap = document.getElementById('imgs');
SLOTS.forEach((s, idx) => imgsWrap.insertAdjacentHTML('beforeend', slotHTML(idx + 1, s.label)));

function resizeImage(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim){ height *= maxDim/width; width = maxDim; }
        else if (height > maxDim){ width *= maxDim/height; height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function setSlotFilled(i, key, src){
  imageData[key] = src;
  const shot = document.getElementById(`shot${i}`);
  const fileInput = document.getElementById(`file${i}`);
  shot.classList.add('filled');
  let img = shot.querySelector('img');
  if(!img){
    img = document.createElement('img');
    shot.insertBefore(img, shot.querySelector('.tag'));
  }
  img.src = src;
  if(!shot.querySelector('.clear')){
    const clr = document.createElement('div');
    clr.className = 'clear';
    clr.textContent = '✕';
    clr.addEventListener('click', (ev) => {
      ev.preventDefault(); ev.stopPropagation();
      clearSlot(i, key);
    });
    shot.appendChild(clr);
  }
}

function clearSlot(i, key){
  delete imageData[key];
  const shot = document.getElementById(`shot${i}`);
  const fileInput = document.getElementById(`file${i}`);
  shot.classList.remove('filled');
  const img = shot.querySelector('img'); if(img) img.remove();
  const clr = shot.querySelector('.clear'); if(clr) clr.remove();
  if(fileInput) fileInput.value = '';
}

ALL_SLOTS.forEach((s, i) => {
  const fileInput = document.getElementById(`file${i}`);
  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const dataUrl = await resizeImage(file, 1280, 0.72);
    setSlotFilled(i, s.key, dataUrl);
  });
});

    const json = await res.json();

      showMsg('ไม่พบข้อมูลรายการนี้', false);

    document.getElementById('sealNo').value = json.sealNo || '';
    document.getElementById('plateNo').value = json.plateNo || '';
    document.getElementById('densityDoc').value = json.densityDoc || '';
    document.getElementById('tempDoc').value = json.tempDoc || '';
    document.getElementById('netQuantity').value = json.netQuantity || '';
    document.getElementById('densityActual').value = json.densityActual || '';
    document.getElementById('tempActual').value = json.tempActual || '';

// ---------- กล่องสรุปผล + แชร์ LINE ----------
const summaryModal = document.getElementById('summaryModal');
const summaryTitle = document.getElementById('summaryTitle');
const summaryRows = document.getElementById('summaryRows');
const summaryImgs = document.getElementById('summaryImgs');
let lastSummaryText = '';
let lastLocalImages = [];
let lastSummaryTitle = '';
let lastSummaryRowsData = [];

function dataUrlToFile(dataUrl, filename){
  const parts = dataUrl.split(',');
  const mimeMatch = parts[0].match(/data:(.*?);base64/);
  const mime = mimeMatch ? mimeMatch[1] : 'image/jpeg';
  const binary = atob(parts[1]);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return new File([bytes], filename, { type: mime });
}

// วาดข้อความสรุปเป็น "รูปภาพ" หนึ่งใบ (ใช้ toDataURL แบบ sync ไม่ใช่ toBlob แบบ async
// เพื่อไม่ให้เสียสิทธิ์ user-gesture ก่อนเรียก navigator.share) แล้วส่งไปพร้อมรูปถ่ายจริง
// เพื่อให้ LINE แสดงข้อความสรุปแน่นอน 100% (บางแอปไม่แสดง text ที่แนบมากับ navigator.share)
function buildSummaryImageDataUrl(title, rows){
  const width = 800;
  const rowHeight = 46;
  const headerHeight = 92;
  const padding = 32;
  const height = headerHeight + rows.length * rowHeight + padding;
  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, width, height);

  ctx.fillStyle = '#111827';
  ctx.fillRect(0, 0, width, headerHeight);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 28px Sarabun, Tahoma, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillText(title, padding, headerHeight / 2);

  let y = headerHeight;
  rows.forEach((r, i) => {
    if(i % 2 === 0){
      ctx.fillStyle = '#F8F9FB';
      ctx.fillRect(0, y, width, rowHeight);
    }
    ctx.fillStyle = '#64748B';
    ctx.font = '19px Sarabun, Tahoma, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(String(r[0]), padding, y + rowHeight / 2);
    ctx.fillStyle = '#1F2937';
    ctx.font = 'bold 19px Sarabun, Tahoma, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(String(r[1]), width - padding, y + rowHeight / 2);
    y += rowHeight;
  });

  return canvas.toDataURL('image/png');
}

function showSummary(title, rows, images, localImages){
  summaryTitle.textContent = title;
  summaryRows.innerHTML = rows.map(r => `<div class="modal-row"><span>${r[0]}</span><span>${r[1]}</span></div>`).join('');
  summaryImgs.innerHTML = (images || []).map(u => `<img src="${u}">`).join('');
  lastSummaryText = title + '\n' + rows.map(r => `${r[0]}: ${r[1]}`).join('\n') +
    (images && images.length ? '\n\nรูปภาพ:\n' + images.join('\n') : '');
  lastLocalImages = localImages || [];
  lastSummaryTitle = title;
  lastSummaryRowsData = rows;
  summaryModal.classList.add('show');
}
document.getElementById('summaryCloseBtn').addEventListener('click', () => summaryModal.classList.remove('show'));
document.getElementById('lineShareBtn').addEventListener('click', () => {
  // ทำทุกอย่างแบบ sync ล้วน (ไม่มี await/alert คั่นกลาง) เพื่อไม่ให้เบราว์เซอร์ตัดสิทธิ์ที่มาจากการคลิกของผู้ใช้
  const textOnly = lastSummaryText.split('\n\nรูปภาพ:')[0];

  // 1) เปิด LINE พร้อมข้อความสรุปจริง (ตัวอักษรจริง ไม่ใช่รูปภาพของข้อความ) — เปิดแท็บใหม่ไม่รบกวนหน้าปัจจุบัน
  const topNavHelper = document.getElementById('topNavHelper');
  topNavHelper.href = 'https://line.me/R/msg/text/?' + encodeURIComponent(textOnly);
  topNavHelper.click();

  // 2) แชร์รูปถ่ายจริงแยกต่างหาก (ถ้ามี) ผ่าน Web Share ของเครื่อง
  let diagReason = '';
  if(lastLocalImages.length){
    try{
      const files = lastLocalImages.map((du, i) => dataUrlToFile(du, `photo${i + 1}.jpg`));
      if(!navigator.share){
        diagReason = 'ไม่มี navigator.share';
      } else if(!navigator.canShare){
        diagReason = 'ไม่มี navigator.canShare';
      } else if(!navigator.canShare({ files: files })){
        diagReason = 'canShare({files}) = false';
      } else {
        navigator.share({ files: files }).catch(()=>{});
        return;
      }
    }catch(shareErr){
      diagReason = 'error: ' + shareErr.message;
    }
  } else {
    return; // ไม่มีรูป แค่เปิด LINE ข้อความอย่างเดียวก็พอ
  }

  // สำรอง: ดาวน์โหลดรูปถ่ายจริงลงเครื่อง (กรณี Web Share แนบไฟล์ไม่ได้)
  lastLocalImages.forEach((du, i) => {
    const a = document.createElement('a');
    a.href = du;
    a.download = `photo${i + 1}.jpg`;
    document.body.appendChild(a);
    a.click();
    a.remove();
  });
  showMsg('เปิด LINE พร้อมข้อความสรุปแล้ว และดาวน์โหลดรูป ' + lastLocalImages.length + ' รูปลงเครื่อง กรุณาแนบรูปจากคลังภาพใน LINE เองครับ [เหตุผล: ' + diagReason + ']', true);
});

// ---------- submit ----------
const form = document.getElementById('form');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const payload = {
    form: 'receipt',
    editRowId: editRowId,
    date: document.getElementById('date').value,
    timeDown: document.getElementById('timeDown').value,
    tripNo: document.getElementById('tripNo').value,
    company: document.getElementById('company').value,
    invoiceNo: document.getElementById('invoiceNo').value,
    sealNo: document.getElementById('sealNo').value,
    plateNo: document.getElementById('plateNo').value,
    densityDoc: document.getElementById('densityDoc').value,
    tempDoc: document.getElementById('tempDoc').value,
    netQuantity: document.getElementById('netQuantity').value,
    densityActual: document.getElementById('densityActual').value,
    tempActual: document.getElementById('tempActual').value,
    pressureActual: document.getElementById('pressureActual').value,
    docImg: imageData.docImg,
    sealImg1: imageData.sealImg1,
    sealImg2: imageData.sealImg2,
    pressureGaugeImg: imageData.pressureGaugeImg,
    truckGaugeImg: imageData.truckGaugeImg,
    densityImg: imageData.densityImg,
    tempImg: imageData.tempImg,
    pressureReadingImg: imageData.pressureReadingImg
  };

  submitBtn.disabled = true;
  submitBtn.textContent = 'กำลังบันทึก…';
  try{
    const res = await fetch(GAS_URL, { method:'POST', body: JSON.stringify(payload) });
    const json = await res.json();
    if(json && json.status === 'ok'){
      showMsg(json.mode === 'updated' ? 'แก้ไขข้อมูลสำเร็จ ✓' : 'บันทึกข้อมูลสำเร็จ ✓', true);
      const localImgs = Object.values(imageData).filter(x => !!x);
      clearFormForNewEntry();
      loadEntries();
      showSummary(json.mode === 'updated' ? 'แก้ไขข้อมูลสำเร็จ' : 'บันทึกข้อมูลสำเร็จ', [
        ['วันที่', json.date], ['เวลาลง', json.timeDown], ['เที่ยวที่', json.tripNo],
        ['บริษัทขนส่ง', json.company], ['เลขที่ใบกำกับ', json.invoiceNo],
        ['หมายเลขซีล', json.sealNo], ['ทะเบียนรถ', json.plateNo]
      ], json.images, localImgs);
    } else {
      showMsg('บันทึกไม่สำเร็จ: ' + (json && json.message ? json.message : 'ไม่ทราบสาเหตุ'), false);
    }
  }catch(err){
    showMsg('เชื่อมต่อไม่สำเร็จ กรุณาลองใหม่', false);
  }finally{
    submitBtn.disabled = false;
    submitBtn.textContent = 'บันทึกข้อมูล';
  }
});

// ---------- recent entries ----------
const entriesEl = document.getElementById('entries');
async function loadEntries(){
  entriesEl.innerHTML = '<div class="empty-hint">กำลังโหลด…</div>';
  try{
    const res = await fetch(GAS_URL + '?action=receiptList&limit=8');
    const json = await res.json();
    const rows = (json && json.rows) || [];
    if(rows.length === 0){
      entriesEl.innerHTML = '<div class="empty-hint">ยังไม่มีข้อมูล</div>';
      return;
    }
    entriesEl.innerHTML = rows.map(r => `
      <div class="entry" data-rowid="${r.rowId}" style="cursor:pointer;">
        <div class="top"><span>${r.date || ''} ${r.timeDown || ''}</span><span>เที่ยว ${r.tripNo || '-'} · ทะเบียน ${r.plateNo || '-'}</span></div>
        <div class="company">${r.company || ''}</div>
        <div>ใบกำกับ: ${r.invoiceNo || '-'} · ซีล: ${r.sealNo || '-'}</div>
      </div>
    `).join('');
    entriesEl.querySelectorAll('.entry').forEach(el => {
      el.addEventListener('click', () => loadForEdit(el.dataset.rowid));
    });
  }catch(err){
    entriesEl.innerHTML = '<div class="empty-hint">โหลดรายการไม่สำเร็จ</div>';
  }
}
document.getElementById('refreshBtn').addEventListener('click', loadEntries);
loadEntries();
