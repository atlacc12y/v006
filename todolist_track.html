<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>ติดตามงาน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800&family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2F4F7;
    --paper-2:#E6E9EE;
    --ink:#1F2937;
    --ink-soft:#64748B;
    --brass:#2F6FE0;
    --brass-dark:#1D4ED8;
    --green:#2E9C4C;
    --red:#DC3545;
    --line:#DFE3E8;
    --panel:#111827;
    --radius:8px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--paper);
    background-image:
      linear-gradient(var(--paper-2) 1px, transparent 1px),
      linear-gradient(90deg, var(--paper-2) 1px, transparent 1px);
    background-size:22px 22px;
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  header{ padding:22px 18px 10px 62px; }
  header h1{
    font-family:'Archivo',sans-serif; font-weight:800;
    font-size:24px; margin:0 0 6px; letter-spacing:-.01em;
  }
    .topbar{
    background:var(--panel); color:#fff; display:flex; align-items:center; gap:12px;
    padding:12px 16px; position:sticky; top:0; z-index:40;
  }
  .topbar-logo{ height:26px; width:auto; display:block; }
  .topbar-title{
    font-family:'Archivo',sans-serif; font-weight:800; font-size:15px;
    letter-spacing:-.01em; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .menu-btn{
    width:34px; height:34px; border-radius:8px; border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.06); display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0;
  }
  .menu-btn svg{ width:18px; height:18px; stroke:#fff; }
  .sidebar-overlay{
    position:fixed; inset:0; background:rgba(10,14,20,.55); z-index:60;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .sidebar-overlay.show{ opacity:1; pointer-events:auto; }
  .sidebar{
    position:fixed; top:0; left:0; bottom:0; width:250px; max-width:78vw;
    background:var(--panel); z-index:70; transform:translateX(-100%);
    transition:transform .25s ease; box-shadow:3px 0 20px rgba(0,0,0,.35);
    display:flex; flex-direction:column;
  }
  .sidebar.show{ transform:translateX(0); }
  .sidebar-header{
    padding:22px 18px; display:flex; align-items:center; gap:10px;
    border-bottom:1px solid rgba(255,255,255,.08); position:relative;
  }
  .sidebar-header img{ height:30px; width:auto; display:block; }
  .sidebar-header span{
    color:#fff; font-family:'Archivo',sans-serif; font-weight:800; font-size:12.5px;
    letter-spacing:.02em; line-height:1.25;
  }
  .sidebar-nav{ padding:14px 12px; flex:1; overflow-y:auto; }
  .sidebar a{
    display:block; padding:12px 12px; border-radius:8px; margin-bottom:4px;
    font-family:'Inter',sans-serif; font-weight:600; font-size:14.5px;
    color:rgba(255,255,255,.72); text-decoration:none; border-left:3px solid transparent;
  }
  .sidebar a.active{
    background:rgba(255,255,255,.08); color:#fff; border-left:3px solid var(--brass);
    font-weight:700;
  }
  .sidebar a:not(.active):active{ background:rgba(255,255,255,.05); }
  .sidebar-close{
    position:absolute; top:18px; right:14px; width:26px; height:26px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    color:rgba(255,255,255,.6); font-size:17px;
  }
  .nav-links{ display:flex; gap:14px; flex-wrap:wrap; }
  .nav-links a{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--brass-dark);
    text-decoration:none; font-weight:600; white-space:nowrap;
  }

  main{ padding:0 14px; max-width:520px; margin:0 auto; }

  .card{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:14px;
  }
  .card h2{
    font-family:'Archivo',sans-serif; font-size:13px; font-weight:800;
    text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft);
    margin:0 0 12px;
  }

  .field{ margin-bottom:12px; }
  .field:last-child{ margin-bottom:0; }
  .field label{
    display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft);
    margin-bottom:5px;
  }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  input[type=text], input[type=number], select{
    width:100%; padding:12px 12px; border:1.5px solid var(--line);
    border-radius:10px; font-size:16px; font-family:'IBM Plex Mono',monospace;
    background:#FBFBF9; color:var(--ink);
  }
  input[type=text]{ font-family:'Inter',sans-serif; font-size:15px; }
  select{ font-family:'Inter',sans-serif; font-size:14.5px; appearance:none; }
  input:focus, select:focus{ outline:none; border-color:var(--brass); }

  button.submit{
    width:100%; padding:15px; border:none; border-radius:12px;
    background:var(--brass); color:#FFFFFF; font-family:'Archivo',sans-serif;
    font-weight:800; font-size:15px; letter-spacing:.02em; cursor:pointer;
    margin-top:4px;
  }
  button.submit:active{ background:var(--brass-dark); }
  button.submit:disabled{ background:#C7D1E0; color:#7C8AA0; }

  .msg{
    text-align:center; font-size:13px; font-weight:600; padding:10px;
    border-radius:10px; margin-bottom:14px; display:none;
  }
  .msg.show{ display:block; }
  .msg.ok{ background:#E4F1E7; color:var(--green); }
  .msg.err{ background:#F6E4E2; color:var(--red); }

  .open-item{
    border:1px solid var(--line); border-radius:10px; padding:12px;
    margin-bottom:10px; background:#FBFBF9;
  }
  .open-item:last-child{ margin-bottom:0; }
  .open-item .top{
    display:flex; justify-content:space-between; align-items:baseline;
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft);
  }
  .open-item .plate{
    font-family:'Archivo',sans-serif; font-weight:800; font-size:16px;
    color:var(--ink); margin:4px 0 2px;
  }
  .open-item .meta{ font-size:12.5px; color:var(--ink-soft); margin-bottom:8px; }
  .out-btn{
    width:100%; padding:10px; border:none; border-radius:8px;
    background:var(--panel); color:#8AB4FF; font-family:'Archivo',sans-serif;
    font-weight:800; font-size:13px; cursor:pointer;
  }
  .out-btn:active{ background:#0A0E14; }
  .out-btn:disabled{ opacity:.5; }
  .finish-btn{
    width:100%; padding:10px; border:none; border-radius:8px;
    background:var(--brass); color:#fff; font-family:'Archivo',sans-serif;
    font-weight:800; font-size:13px; cursor:pointer;
  }
  .finish-btn:active{ background:var(--brass-dark); }
  .finish-btn:disabled{ opacity:.5; }
  .delay-input{
    width:100%; padding:9px 10px; border:1.5px solid var(--line);
    border-radius:8px; font-size:13.5px; font-family:'Inter',sans-serif;
    background:#fff; color:var(--ink);
  }
  .delay-input:focus{ outline:none; border-color:var(--brass); }

  .entry{
    padding:10px 0; border-bottom:1px solid var(--line); font-size:12.5px;
  }
  .entry:last-child{ border-bottom:none; }
  .entry .top{ display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; color:var(--ink-soft); margin-bottom:3px; }
  .entry .plate{ font-weight:700; }
  .entry .duration{ font-family:'IBM Plex Mono',monospace; font-weight:700; color:var(--brass-dark); }
  .empty-hint{ color:var(--ink-soft); font-size:13px; text-align:center; padding:8px 0; }
  .refresh{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--brass-dark);
    background:none; border:none; float:right; cursor:pointer; font-weight:600;
  }

  /* 3-photo capture grid */
  .imgs3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .shot{
    position:relative; aspect-ratio:1/1; border-radius:9px; overflow:hidden;
    border:1.5px dashed var(--line); background:#FBFBF9;
    display:flex; align-items:center; justify-content:center;
  }
  .shot.filled{ border-style:solid; border-color:var(--brass); }
  .shot img{ width:100%; height:100%; object-fit:cover; display:block; }
  .shot input{ position:absolute; inset:0; opacity:0; cursor:pointer; }
  .shot .hint{
    display:flex; flex-direction:column; align-items:center; gap:4px;
    color:var(--ink-soft); font-size:9.5px; font-weight:600;
    text-transform:uppercase; letter-spacing:.04em; pointer-events:none; text-align:center;
  }
  .shot .hint svg{ width:16px; height:16px; stroke:var(--brass-dark); }
  .shot .clear{
    position:absolute; top:4px; right:4px; width:18px; height:18px;
    background:rgba(27,36,29,.72); border-radius:50%; color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:11px;
    z-index:2;
  }

  /* Expandable capture panel inside an open-item */
  .capture-panel{
    display:none; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);
  }
  .capture-panel.show{ display:block; }
  .capture-panel .imgs3{ margin-bottom:10px; }
  .confirm-btn{
    width:100%; padding:10px; border:none; border-radius:8px;
    background:var(--green); color:#fff; font-family:'Archivo',sans-serif;
    font-weight:800; font-size:13px; cursor:pointer;
  }
  .confirm-btn:disabled{ opacity:.5; }

  /* Summary popup modal */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,14,20,.6); z-index:80;
    display:none; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.show{ display:flex; }
  .modal-box{
    background:#fff; border-radius:16px 16px 0 0; padding:20px 18px 24px;
    width:100%; max-width:520px; max-height:85vh; overflow-y:auto;
  }
  .modal-box h3{
    font-family:'Archivo',sans-serif; font-weight:800; font-size:16px;
    margin:0 0 14px; color:var(--ink);
  }
  .modal-row{ display:flex; justify-content:space-between; font-size:13.5px; padding:6px 0; border-bottom:1px solid var(--line); }
  .modal-row span:first-child{ color:var(--ink-soft); }
  .modal-row span:last-child{ font-weight:700; }
  .modal-imgs{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:14px 0; }
  .modal-imgs img{ width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:8px; border:1px solid var(--line); }
  .line-btn{
    width:100%; padding:13px; border:none; border-radius:10px;
    background:#06C755; color:#fff; font-family:'Archivo',sans-serif;
    font-weight:800; font-size:14.5px; cursor:pointer; margin-top:14px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .modal-close-btn{
    width:100%; padding:12px; border:1.5px solid var(--line); border-radius:10px;
    background:#fff; color:var(--ink-soft); font-family:'Inter',sans-serif;
    font-weight:700; font-size:13.5px; cursor:pointer; margin-top:8px;
  }

  .sub-desc{ font-size:11.5px; color:var(--ink-soft); margin:0 0 12px; }

  .save-bar{
    position:sticky; bottom:0; background:#fff; border-top:1px solid var(--line);
    padding:12px 14px; margin-top:6px;
  }
  button.save-btn{
    width:100%; max-width:520px; margin:0 auto; display:block; padding:15px; border:none; border-radius:10px;
    background:var(--green); color:#fff; font-family:'Archivo',sans-serif;
    font-weight:800; font-size:15px; cursor:pointer;
  }
  button.save-btn:active{ background:#237A3B; }

  .point-row{
    border:1px solid var(--line); border-radius:10px; padding:12px;
    margin-bottom:10px; background:#FBFBF9;
  }
  .point-row:last-child{ margin-bottom:0; }
  .point-header{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;
  }
  .point-name{
    font-family:'Archivo',sans-serif; font-weight:800; font-size:14px; color:var(--ink);
  }
  .point-diff{
    font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:13px;
    padding:2px 8px; border-radius:10px; background:var(--paper-2); color:var(--ink-soft);
  }
  .point-diff.ok{ background:#DDF3E1; color:var(--green); }
  .point-diff.bad{ background:#FBEBEC; color:var(--red); }
  .point-photo{ max-width:110px; }

  /* To Do List — จัดกลุ่มตามสถานะแบบเรียงต่อกันในแนวตั้ง (เลื่อนขึ้น-ลงตามปกติ ไม่ต้องปาดซ้าย-ขวา) */
  .status-group{ background:var(--paper); border-radius:12px; padding:12px; margin-bottom:12px; }
  .status-group:last-child{ margin-bottom:0; }
  .status-group-header{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;
    cursor:pointer; user-select:none;
  }
  .status-group-title{
    font-family:'Archivo',sans-serif; font-weight:800; font-size:13.5px; color:var(--ink);
    display:flex; align-items:center; gap:7px;
  }
  .status-group-dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .status-group-right{ display:flex; align-items:center; gap:8px; }
  .status-group-count{
    font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:700; color:var(--ink-soft);
    background:#fff; padding:2px 8px; border-radius:10px;
  }
  .status-group-chevron{ transition:transform .2s ease; color:var(--ink-soft); font-size:11px; }
  .status-group.collapsed .status-group-chevron{ transform:rotate(-90deg); }
  .status-group.collapsed .status-group-body{ display:none; }
  .task-card{
    background:#fff; border:1px solid var(--line); border-radius:10px; padding:12px;
    margin-bottom:10px; box-shadow:0 1px 2px rgba(0,0,0,.04);
  }
  .task-card:last-child{ margin-bottom:0; }
  .task-title{ font-family:'Inter',sans-serif; font-weight:700; font-size:14px; color:var(--ink); margin-bottom:6px; }
  .task-desc{ font-size:12px; color:var(--ink-soft); margin-bottom:8px; line-height:1.4; }
  .task-meta{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .task-chip{
    display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600;
    padding:3px 8px; border-radius:20px; background:var(--paper-2); color:var(--ink-soft);
  }
  .task-chip.assignee{ background:#E4ECFB; color:var(--brass-dark); }
  .task-chip.due{ background:#F1F1F1; color:var(--ink-soft); }
  .task-chip.due.overdue{ background:#FBEBEC; color:var(--red); font-weight:700; }
  .priority-badge{
    display:inline-block; font-size:10px; font-weight:800; padding:2px 8px; border-radius:6px;
    text-transform:uppercase; letter-spacing:.03em;
  }
  .priority-badge.normal{ background:#EDEDED; color:#6B7280; }
  .priority-badge.urgent{ background:#FEF0D5; color:#9A6400; }
  .priority-badge.critical{ background:#FBEBEC; color:var(--red); }
  .task-actions{ display:flex; gap:6px; }
  .task-btn{
    flex:1; padding:7px; border:none; border-radius:7px; font-size:11.5px; font-weight:700;
    cursor:pointer; font-family:'Inter',sans-serif;
  }
  .task-btn.primary{ background:var(--brass); color:#fff; }
  .task-btn.success{ background:var(--green); color:#fff; }
  .task-btn.ghost{ background:var(--paper-2); color:var(--ink-soft); flex:0 0 34px; }
  .kanban-empty{ text-align:center; color:var(--ink-soft); font-size:12px; padding:20px 0; }
  .filter-row{ display:flex; gap:8px; margin-bottom:12px; }
  .filter-row select{ flex:1; }
</style>
</head>

<main>
  <div id="msg" class="msg"></div>

  <div class="card">
    <h2>ติดตามงาน <button type="button" class="refresh" id="refreshBtn">รีเฟรช ↻</button></h2>

      <label for="filterAssignee">กรองตามพนักงาน</label>
      <div class="filter-row" style="margin-bottom:6px;">
        <select id="filterAssignee">
          <option value="">พนักงานทั้งหมด</option>
        </select>
        <button type="button" class="task-btn ghost" id="clearFilterBtn" style="flex:0 0 70px;">ล้าง</button>
      </div>

<script>
// โหมด standalone: เข้าผ่านลิงก์ที่มี ?standalone=1 จะซ่อนเมนู/แถบข้าง (ใช้แทน server-side templating เดิม)
const isStandalone = new URLSearchParams(location.search).get('standalone') === '1';
if(isStandalone){
  document.addEventListener('DOMContentLoaded', () => {
    const mb = document.getElementById('menuBtn');
    const sb = document.getElementById('sidebar');
    const so = document.getElementById('sidebarOverlay');
    if(mb) mb.style.display = 'none';
    if(sb) sb.remove();
    if(so) so.remove();
  });
}

const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sidebarClose = document.getElementById('sidebarClose');
function openSidebar(){ if(sidebar) sidebar.classList.add('show'); if(sidebarOverlay) sidebarOverlay.classList.add('show'); }
function closeSidebar(){ if(sidebar) sidebar.classList.remove('show'); if(sidebarOverlay) sidebarOverlay.classList.remove('show'); }
if(menuBtn) menuBtn.addEventListener('click', openSidebar);
if(sidebarOverlay) sidebarOverlay.addEventListener('click', closeSidebar);
if(sidebarClose) sidebarClose.addEventListener('click', closeSidebar);

const GAS_URL = "https://script.google.com/macros/s/AKfycbzFwNJc2PqCmZwNLBRo5guB1KUxsS4GFEttPNuSGMvDISZg6hNAumQaJO-1SneZlOCR6g/exec";

const msgEl = document.getElementById('msg');
function showMsg(text, ok){
  msgEl.textContent = text;
  msgEl.className = 'msg show ' + (ok ? 'ok' : 'err');
  setTimeout(()=>{ msgEl.className = 'msg'; }, 4000);
}

// ---------- เชื่อมข้อมูลจริงกับ Google Sheets ----------
const PRIORITY_LABELS = { normal: 'ปกติ', urgent: 'ด่วน', critical: 'ด่วนมาก' };
const STATUS_COLUMNS = [
  { key: 'todo', title: 'รอดำเนินการ', dot: '#94A3B8' },
  { key: 'doing', title: 'กำลังทำ', dot: '#2F6FE0' },
  { key: 'done', title: 'เสร็จแล้ว', dot: '#2E9C4C' }
];

function todayStr(){
  const d = new Date();
  const pad2 = x => String(x).padStart(2, '0');
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}

let tasks = [];

function fmtThaiDate(dateStr){
  if(!dateStr) return '-';
  const [y, m, d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}

function isOverdue(dateStr, status){
  if(!dateStr || status === 'done') return false;
  return dateStr < todayStr();
}

function populateAssigneeFilter(){
  const sel = document.getElementById('filterAssignee');
  const current = sel.value;
  const names = [...new Set(tasks.map(t => t.assignee).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">พนักงานทั้งหมด</option>' + names.map(n => `<option value="${n}">${n}</option>`).join('');
  sel.value = current;
}

async function loadTasksFromServer(){
  const board = document.getElementById('kanbanBoard');
  board.innerHTML = '<div class="kanban-empty">กำลังโหลด…</div>';
  try{
    const res = await fetch(GAS_URL + '?action=taskList');
    const json = await res.json();
    tasks = (json && json.status === 'ok') ? json.tasks : [];
    renderBoard();
  }catch(err){
    showMsg('โหลดรายการงานไม่สำเร็จ กรุณาลองใหม่', false);
    board.innerHTML = '<div class="kanban-empty">โหลดข้อมูลไม่สำเร็จ</div>';
  }
}

function renderBoard(){
  populateAssigneeFilter();
  const filterVal = document.getElementById('filterAssignee').value;
  const board = document.getElementById('kanbanBoard');

  const filterResultLabel = document.getElementById('filterResultLabel');
  const matchCount = tasks.filter(t => !filterVal || t.assignee === filterVal).length;
  filterResultLabel.textContent = filterVal
    ? `กำลังกรอง: ${filterVal} — พบ ${matchCount} งาน`
    : `แสดงทั้งหมด ${tasks.length} งาน`;

  board.innerHTML = STATUS_COLUMNS.map(col => {
    const colTasks = tasks.filter(t => t.status === col.key && (!filterVal || t.assignee === filterVal));
    const cardsHtml = colTasks.length ? colTasks.map(t => taskCardHtml(t, col.key)).join('') : `<div class="kanban-empty">ไม่มีงานในสถานะนี้</div>`;
    // ย่อกลุ่ม "เสร็จแล้ว" ไว้เป็นค่าเริ่มต้น ลดความรก ส่วนรอดำเนินการ/กำลังทำเปิดไว้ให้เห็นทันที
    const collapsedClass = col.key === 'done' ? ' collapsed' : '';
    return `
      <div class="status-group${collapsedClass}" data-status="${col.key}">
        <div class="status-group-header" data-toggle="${col.key}">
          <div class="status-group-title"><span class="status-group-dot" style="background:${col.dot};"></span>${col.title}</div>
          <div class="status-group-right">
            <span class="status-group-count">${colTasks.length}</span>
            <span class="status-group-chevron">▾</span>
          </div>
        </div>
        <div class="status-group-body">${cardsHtml}</div>
      </div>
    `;
  }).join('');

  board.querySelectorAll('[data-toggle]').forEach(header => {
    header.addEventListener('click', () => {
      header.closest('.status-group').classList.toggle('collapsed');
    });
  });

  board.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', async (ev) => {
      ev.stopPropagation();
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      const task = tasks.find(t => t.id === id);
      if(!task) return;

      btn.disabled = true;
      try{
        if(action === 'delete'){
          if(!confirm('ลบงาน "' + task.title + '" ใช่ไหม?')) { btn.disabled = false; return; }
          await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ form: 'taskDelete', id: id }) });
          showMsg('ลบงานแล้ว', true);
        } else {
          const newStatus = action === 'start' ? 'doing' : (action === 'done' ? 'done' : 'todo');
          await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ form: 'taskUpdateStatus', id: id, status: newStatus }) });
          const msg = action === 'start' ? 'ย้ายงาน "' + task.title + '" ไปกำลังทำแล้ว'
            : action === 'done' ? 'งาน "' + task.title + '" เสร็จแล้ว ✓'
            : 'เปิดงาน "' + task.title + '" กลับมาทำใหม่';
          showMsg(msg, true);
        }
        loadTasksFromServer();
      }catch(err){
        showMsg('เชื่อมต่อไม่สำเร็จ กรุณาลองใหม่', false);
        btn.disabled = false;
      }
    });
  });
}

function taskCardHtml(t, statusKey){
  const overdue = isOverdue(t.due, t.status);
  let actionsHtml = '';
  if(statusKey === 'todo'){
    actionsHtml = `<button type="button" class="task-btn primary" data-action="start" data-id="${t.id}">เริ่มทำ</button><button type="button" class="task-btn ghost" data-action="delete" data-id="${t.id}">✕</button>`;
  } else if(statusKey === 'doing'){
    actionsHtml = `<button type="button" class="task-btn success" data-action="done" data-id="${t.id}">ทำเสร็จแล้ว</button><button type="button" class="task-btn ghost" data-action="delete" data-id="${t.id}">✕</button>`;
  } else {
    actionsHtml = `<button type="button" class="task-btn ghost" data-action="reopen" data-id="${t.id}" style="flex:1;">เปิดทำใหม่</button><button type="button" class="task-btn ghost" data-action="delete" data-id="${t.id}">✕</button>`;
  }
  return `
    <div class="task-card">
      <div class="task-title">${t.title}</div>
      ${t.desc ? `<div class="task-desc">${t.desc}</div>` : ''}
      <div class="task-meta">
        <span class="priority-badge ${t.priority}">${PRIORITY_LABELS[t.priority] || t.priority}</span>
        ${t.assignee ? `<span class="task-chip assignee">👤 ${t.assignee}</span>` : ''}
        <span class="task-chip due ${overdue ? 'overdue' : ''}">${overdue ? '⚠️ เลยกำหนด ' : '📅 '}${fmtThaiDate(t.due)}</span>
      </div>
      <div class="task-actions">${actionsHtml}</div>
    </div>
  `;
}

document.getElementById('filterAssignee').addEventListener('change', renderBoard);
document.getElementById('clearFilterBtn').addEventListener('click', () => {
  document.getElementById('filterAssignee').value = '';
  renderBoard();
});
document.getElementById('refreshBtn').addEventListener('click', () => {
  loadTasksFromServer();
  showMsg('รีเฟรชข้อมูลแล้ว', true);
});

loadTasksFromServer();
</script>

</body>
</html>
