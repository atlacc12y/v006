<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Gate to Gate โรงบรรจุก๊าซกบินทร์บุรี</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800&family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2F4F7;
    --paper-2:#E6E9EE;
    --ink:#1F2937;
    --ink-soft:#64748B;
    --brass:#2F6FE0;
    --brass-dark:#1D4ED8;
    --green:#2E9C4C;
    --red:#DC3545;
    --line:#DFE3E8;
    --panel:#111827;
    --radius:8px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--paper);
    background-image:
      linear-gradient(var(--paper-2) 1px, transparent 1px),
      linear-gradient(90deg, var(--paper-2) 1px, transparent 1px);
    background-size:22px 22px;
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  header{ padding:22px 18px 10px 62px; }
  header h1{
    font-family:'Archivo',sans-serif; font-weight:800;
    font-size:24px; margin:0 0 6px; letter-spacing:-.01em;
  }
    .topbar{
    background:var(--panel); color:#fff; display:flex; align-items:center; gap:12px;
    padding:12px 16px; position:sticky; top:0; z-index:40;
  }
  .topbar-logo{ height:26px; width:auto; display:block; }
  .topbar-title{
    font-family:'Archivo',sans-serif; font-weight:800; font-size:15px;
    letter-spacing:-.01em; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .menu-btn{
    width:34px; height:34px; border-radius:8px; border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.06); display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0;
  }
  .menu-btn svg{ width:18px; height:18px; stroke:#fff; }
  .sidebar-overlay{
    position:fixed; inset:0; background:rgba(10,14,20,.55); z-index:60;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .sidebar-overlay.show{ opacity:1; pointer-events:auto; }
  .sidebar{
    position:fixed; top:0; left:0; bottom:0; width:250px; max-width:78vw;
    background:var(--panel); z-index:70; transform:translateX(-100%);
    transition:transform .25s ease; box-shadow:3px 0 20px rgba(0,0,0,.35);
    display:flex; flex-direction:column;
  }
  .sidebar.show{ transform:translateX(0); }
  .sidebar-header{
    padding:22px 18px; display:flex; align-items:center; gap:10px;
    border-bottom:1px solid rgba(255,255,255,.08); position:relative;
  }
  .sidebar-header img{ height:30px; width:auto; display:block; }
  .sidebar-header span{
    color:#fff; font-family:'Archivo',sans-serif; font-weight:800; font-size:12.5px;
    letter-spacing:.02em; line-height:1.25;
  }
  .sidebar-nav{ padding:14px 12px; flex:1; overflow-y:auto; }
  .sidebar a{
    display:block; padding:12px 12px; border-radius:8px; margin-bottom:4px;
    font-family:'Inter',sans-serif; font-weight:600; font-size:14.5px;
    color:rgba(255,255,255,.72); text-decoration:none; border-left:3px solid transparent;
  }
  .sidebar a.active{
    background:rgba(255,255,255,.08); color:#fff; border-left:3px solid var(--brass);
    font-weight:700;
  }
  .sidebar a:not(.active):active{ background:rgba(255,255,255,.05); }
  .sidebar-close{
    position:absolute; top:18px; right:14px; width:26px; height:26px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    color:rgba(255,255,255,.6); font-size:17px;
  }
  .nav-links{ display:flex; gap:14px; flex-wrap:wrap; }
  .nav-links a{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--brass-dark);
    text-decoration:none; font-weight:600; white-space:nowrap;
  }

  main{ padding:0 14px; max-width:520px; margin:0 auto; }

  .card{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:14px;
  }
  .card h2{
    font-family:'Archivo',sans-serif; font-size:13px; font-weight:800;
    text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft);
    margin:0 0 12px;
  }

  .field{ margin-bottom:12px; }
  .field:last-child{ margin-bottom:0; }
  .field label{
    display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft);
    margin-bottom:5px;
  }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  input[type=text], input[type=number], select{
    width:100%; padding:12px 12px; border:1.5px solid var(--line);
    border-radius:10px; font-size:16px; font-family:'IBM Plex Mono',monospace;
    background:#FBFBF9; color:var(--ink);
  }
  input[type=text]{ font-family:'Inter',sans-serif; font-size:15px; }
  select{ font-family:'Inter',sans-serif; font-size:14.5px; appearance:none; }
  input:focus, select:focus{ outline:none; border-color:var(--brass); }

  button.submit{
    width:100%; padding:15px; border:none; border-radius:12px;
    background:var(--brass); color:#FFFFFF; font-family:'Archivo',sans-serif;
    font-weight:800; font-size:15px; letter-spacing:.02em; cursor:pointer;
    margin-top:4px;
  }
  button.submit:active{ background:var(--brass-dark); }
  button.submit:disabled{ background:#C7D1E0; color:#7C8AA0; }

  .msg{
    text-align:center; font-size:13px; font-weight:600; padding:10px;
    border-radius:10px; margin-bottom:14px; display:none;
  }
  .msg.show{ display:block; }
  .msg.ok{ background:#E4F1E7; color:var(--green); }
  .msg.err{ background:#F6E4E2; color:var(--red); }

  .open-item{
    border:1px solid var(--line); border-radius:10px; padding:12px;
    margin-bottom:10px; background:#FBFBF9;
  }
  .open-item:last-child{ margin-bottom:0; }
  .open-item .top{
    display:flex; justify-content:space-between; align-items:baseline;
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft);
  }
  .open-item .plate{
    font-family:'Archivo',sans-serif; font-weight:800; font-size:16px;
    color:var(--ink); margin:4px 0 2px;
  }
  .open-item .meta{ font-size:12.5px; color:var(--ink-soft); margin-bottom:8px; }
  .out-btn{
    width:100%; padding:10px; border:none; border-radius:8px;
    background:var(--panel); color:#8AB4FF; font-family:'Archivo',sans-serif;
    font-weight:800; font-size:13px; cursor:pointer;
  }
  .out-btn:active{ background:#0A0E14; }
  .out-btn:disabled{ opacity:.5; }
  .finish-btn{
    width:100%; padding:10px; border:none; border-radius:8px;
    background:var(--brass); color:#fff; font-family:'Archivo',sans-serif;
    font-weight:800; font-size:13px; cursor:pointer;
  }
  .finish-btn:active{ background:var(--brass-dark); }
  .finish-btn:disabled{ opacity:.5; }
  .delay-input{
    width:100%; padding:9px 10px; border:1.5px solid var(--line);
    border-radius:8px; font-size:13.5px; font-family:'Inter',sans-serif;
    background:#fff; color:var(--ink);
  }
  .delay-input:focus{ outline:none; border-color:var(--brass); }

  .entry{
    padding:10px 0; border-bottom:1px solid var(--line); font-size:12.5px;
  }
  .entry:last-child{ border-bottom:none; }
  .entry .top{ display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; color:var(--ink-soft); margin-bottom:3px; }
  .entry .plate{ font-weight:700; }
  .entry .duration{ font-family:'IBM Plex Mono',monospace; font-weight:700; color:var(--brass-dark); }
  .empty-hint{ color:var(--ink-soft); font-size:13px; text-align:center; padding:8px 0; }
  .refresh{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--brass-dark);
    background:none; border:none; float:right; cursor:pointer; font-weight:600;
  }

  /* 3-photo capture grid */
  .imgs3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .shot{
    position:relative; aspect-ratio:1/1; border-radius:9px; overflow:hidden;
    border:1.5px dashed var(--line); background:#FBFBF9;
    display:flex; align-items:center; justify-content:center;
  }
  .shot.filled{ border-style:solid; border-color:var(--brass); }
  .shot img{ width:100%; height:100%; object-fit:cover; display:block; }
  .shot input{ position:absolute; inset:0; opacity:0; cursor:pointer; }
  .shot .hint{
    display:flex; flex-direction:column; align-items:center; gap:4px;
    color:var(--ink-soft); font-size:9.5px; font-weight:600;
    text-transform:uppercase; letter-spacing:.04em; pointer-events:none; text-align:center;
  }
  .shot .hint svg{ width:16px; height:16px; stroke:var(--brass-dark); }
  .shot .clear{
    position:absolute; top:4px; right:4px; width:18px; height:18px;
    background:rgba(27,36,29,.72); border-radius:50%; color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:11px;
    z-index:2;
  }

  /* Expandable capture panel inside an open-item */
  .capture-panel{
    display:none; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);
  }
  .capture-panel.show{ display:block; }
  .capture-panel .imgs3{ margin-bottom:10px; }
  .confirm-btn{
    width:100%; padding:10px; border:none; border-radius:8px;
    background:var(--green); color:#fff; font-family:'Archivo',sans-serif;
    font-weight:800; font-size:13px; cursor:pointer;
  }
  .confirm-btn:disabled{ opacity:.5; }

  /* Summary popup modal */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,14,20,.6); z-index:80;
    display:none; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.show{ display:flex; }
  .modal-box{
    background:#fff; border-radius:16px 16px 0 0; padding:20px 18px 24px;
    width:100%; max-width:520px; max-height:85vh; overflow-y:auto;
  }
  .modal-box h3{
    font-family:'Archivo',sans-serif; font-weight:800; font-size:16px;
    margin:0 0 14px; color:var(--ink);
  }
  .modal-row{ display:flex; justify-content:space-between; font-size:13.5px; padding:6px 0; border-bottom:1px solid var(--line); }
  .modal-row span:first-child{ color:var(--ink-soft); }
  .modal-row span:last-child{ font-weight:700; }
  .modal-imgs{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:14px 0; }
  .modal-imgs img{ width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:8px; border:1px solid var(--line); }
  .line-btn{
    width:100%; padding:13px; border:none; border-radius:10px;
    background:#06C755; color:#fff; font-family:'Archivo',sans-serif;
    font-weight:800; font-size:14.5px; cursor:pointer; margin-top:14px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .modal-close-btn{
    width:100%; padding:12px; border:1.5px solid var(--line); border-radius:10px;
    background:#fff; color:var(--ink-soft); font-family:'Inter',sans-serif;
    font-weight:700; font-size:13.5px; cursor:pointer; margin-top:8px;
  }
</style>
</head>

<script>

// ---------- ตัวช่วยจัดการรูปถ่ายทั่วไป ----------
function resizeImage(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim){ height *= maxDim/width; width = maxDim; }
        else if (height > maxDim){ width *= maxDim/height; height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        stampDateTime(ctx, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ประทับวันที่-เวลาปัจจุบันที่มุมล่างขวาของรูป (พื้นหลังทึบให้อ่านง่ายบนพื้นสีอ่อน)
function stampDateTime(ctx, width, height){
  const now = new Date();
  const pad2 = n => String(n).padStart(2, '0');
  const text = `${pad2(now.getDate())}/${pad2(now.getMonth()+1)}/${now.getFullYear()} ${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;

  const fontSize = Math.max(14, Math.round(width * 0.028));
  ctx.font = `600 ${fontSize}px 'IBM Plex Mono', 'Courier New', monospace`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';

  const paddingX = fontSize * 0.6;
  const paddingY = fontSize * 0.5;
  const textWidth = ctx.measureText(text).width;
  const boxW = textWidth + paddingX * 2;
  const boxH = fontSize + paddingY * 1.6;

  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(width - boxW - 8, height - boxH - 8, boxW, boxH);

  ctx.fillStyle = '#ffffff';
  ctx.fillText(text, width - paddingX - 8, height - paddingY - 8);
}

      <span>ถ่ายรูป</span>
    </div>
  </div>`;
}

const captureImages = {}; // key -> [dataUrl, dataUrl, dataUrl]

function setupCaptureSlots(key, count){
  captureImages[key] = new Array(count).fill(null);
  for(let i=0;i<count;i++){
    const id = `${key}_${i}`;
    const fileInput = document.getElementById(`file_${id}`);
    if(!fileInput) continue;
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const dataUrl = await resizeImage(file, 900, 0.72);
      captureImages[key][i] = dataUrl;
      const shot = document.getElementById(`shot_${id}`);
      shot.classList.add('filled');
      let img = shot.querySelector('img');
      if(!img){
        img = document.createElement('img');
        shot.insertBefore(img, shot.querySelector('.hint'));
      }
      img.src = dataUrl;
      if(!shot.querySelector('.clear')){
        const clr = document.createElement('div');
        clr.className = 'clear';
        clr.textContent = '✕';
        clr.addEventListener('click', (ev) => {
          ev.preventDefault(); ev.stopPropagation();
          captureImages[key][i] = null;
          shot.classList.remove('filled');
          if(img) img.remove();
          clr.remove();
          fileInput.value = '';
        });
        shot.appendChild(clr);
      }
    });
  }
}

function capturesComplete(key){
  const arr = captureImages[key] || [];
  return arr.filter(x => !!x).length >= 3;
}

// ---------- กล่องสรุปผล + แชร์ LINE ----------
const summaryModal = document.getElementById('summaryModal');
const summaryTitle = document.getElementById('summaryTitle');
const summaryRows = document.getElementById('summaryRows');
const summaryImgs = document.getElementById('summaryImgs');
let lastSummaryText = '';
let lastLocalImages = [];
let lastRemoteImages = [];
let lastSummaryTitle = '';
let lastSummaryRowsData = [];

function dataUrlToFile(dataUrl, filename){
  const parts = dataUrl.split(',');
  const mimeMatch = parts[0].match(/data:(.*?);base64/);
  const mime = mimeMatch ? mimeMatch[1] : 'image/jpeg';
  const binary = atob(parts[1]);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return new File([bytes], filename, { type: mime });
}

// ดาวน์โหลดรูปให้เชื่อถือได้จริง: แปลง data: URI เป็น Blob URL ก่อน
// (มือถือหลายรุ่นไม่รองรับ attribute download กับ data: URI โดยตรง เปิดเป็นลิงก์รูปภาพแทนที่จะดาวน์โหลด)
function downloadDataUrl(dataUrl, filename){
  const file = dataUrlToFile(dataUrl, filename);
  const blobUrl = URL.createObjectURL(file);
  const a = document.createElement('a');
  a.href = blobUrl;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);
}

// วาดข้อความสรุปเป็น "รูปภาพ" หนึ่งใบ (ใช้ toDataURL แบบ sync ไม่ใช่ toBlob แบบ async
// เพื่อไม่ให้เสียสิทธิ์ user-gesture ก่อนเรียก navigator.share) แล้วส่งไปพร้อมรูปถ่ายจริง
// เพื่อให้ LINE แสดงข้อความสรุปแน่นอน 100% (บางแอปไม่แสดง text ที่แนบมากับ navigator.share)
function buildSummaryImageDataUrl(title, rows){
  const width = 800;
  const rowHeight = 46;
  const headerHeight = 92;
  const padding = 32;
  const height = headerHeight + rows.length * rowHeight + padding;
  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, width, height);

  ctx.fillStyle = '#111827';
  ctx.fillRect(0, 0, width, headerHeight);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 28px Sarabun, Tahoma, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillText(title, padding, headerHeight / 2);

  let y = headerHeight;
  rows.forEach((r, i) => {
    if(i % 2 === 0){
      ctx.fillStyle = '#F8F9FB';
      ctx.fillRect(0, y, width, rowHeight);
    }
    ctx.fillStyle = '#64748B';
    ctx.font = '19px Sarabun, Tahoma, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(String(r[0]), padding, y + rowHeight / 2);
    ctx.fillStyle = '#1F2937';
    ctx.font = 'bold 19px Sarabun, Tahoma, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(String(r[1]), width - padding, y + rowHeight / 2);
    y += rowHeight;
  });

  return canvas.toDataURL('image/png');
}

function showSummary(title, rows, images, localImages){
  summaryTitle.textContent = title;
  summaryRows.innerHTML = rows.map(r => `<div class="modal-row"><span>${r[0]}</span><span>${r[1]}</span></div>`).join('');
  summaryImgs.innerHTML = (images || []).map(u => `<img src="${u}">`).join('');
  lastSummaryText = title + '\n' + rows.map(r => `${r[0]}: ${r[1]}`).join('\n') +
    (images && images.length ? '\n\nรูปภาพ:\n' + images.join('\n') : '');
  lastLocalImages = localImages || [];
  lastRemoteImages = images || [];
  lastSummaryTitle = title;
  lastSummaryRowsData = rows;
  summaryModal.classList.add('show');
}
document.getElementById('summaryCloseBtn').addEventListener('click', () => summaryModal.classList.remove('show'));
// ปุ่ม 1: แชร์รูปภาพไปที่ LINE (แยกต่างหาก ไม่พ่วงกับการเปิด LINE ด้วยข้อความ
// เพราะถ้าทำพร้อมกัน การสลับไปเปิดแอป LINE จะทำให้โค้ดส่วนแชร์รูปไม่ได้ทำงานต่อ)
// ปุ่มเดียว: คัดลอกข้อความสรุปเข้าคลิปบอร์ดแบบเงียบๆ (ไม่ await เพื่อไม่เสียสิทธิ์ user-gesture)
// พร้อมกับเปิดหน้าต่างแชร์รูปภาพทันทีในคลิกเดียวกัน — เลือก LINE แล้ว "วาง" ข้อความที่คัดลอกไว้ต่อได้เลย
async function shareToLine(){
  const textOnly = lastSummaryText.split('\n\nรูปภาพ:')[0];

  // คัดลอกข้อความไว้เบื้องหลังเสมอ (ไม่ await) — ใช้ได้ทั้งกรณีมีรูปและไม่มีรูป
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(textOnly).catch(()=>{});
  }

  let files = [];
  let diagReason = '';

  try{
    if(lastLocalImages.length){
      // รูปที่เพิ่งถ่ายใหม่ในเซสชันนี้ (base64) — แปลงเป็นไฟล์ได้ทันทีไม่ต้องรอเน็ต
      files = lastLocalImages.map((du, i) => dataUrlToFile(du, `photo${i + 1}.jpg`));
    } else if(lastRemoteImages.length){
      // เปิดรายการเก่าที่โหลดมา รูปเป็นลิงก์ Drive ต้องดึงไฟล์จริงมาก่อนถึงจะแชร์เป็นรูปได้
      files = await Promise.all(lastRemoteImages.map(async (url, i) => {
        const resp = await fetch(url);
        const blob = await resp.blob();
        return new File([blob], `photo${i + 1}.jpg`, { type: blob.type || 'image/jpeg' });
      }));
    }
  }catch(err){
    diagReason = 'โหลดรูปไม่สำเร็จ: ' + err.message;
    files = [];
  }

  if(files.length){
    try{
      if(navigator.share && navigator.canShare && navigator.canShare({ files: files })){
        await navigator.share({ files: files });
        showMsg('คัดลอกข้อความสรุปไว้แล้ว ✓ หลังแนบรูปใน LINE เสร็จ กด Paste วางข้อความต่อได้เลยครับ', true);
        return;
      }
      diagReason = !navigator.share ? 'ไม่มี navigator.share' : (!navigator.canShare ? 'ไม่มี navigator.canShare' : 'canShare({files}) = false');
    }catch(shareErr){
      if(shareErr && shareErr.name === 'AbortError') return; // ผู้ใช้กดยกเลิกการแชร์เอง ไม่ต้องทำอะไรต่อ
      diagReason = 'error: ' + shareErr.message;
    }
  }

  // สำรอง: ดาวน์โหลดรูป (ถ้ามี) + เปิด LINE พร้อมข้อความเสมอ เพื่อไม่ให้เกิดกรณี "กดแล้วไม่มีอะไรเกิดขึ้น"
  files.forEach((f, i) => {
    const blobUrl = URL.createObjectURL(f);
    const a = document.createElement('a');
    a.href = blobUrl; a.download = `photo${i + 1}.jpg`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);
  });

  const topNavHelper = document.getElementById('topNavHelper');
  topNavHelper.href = 'https://line.me/R/msg/text/?' + encodeURIComponent(textOnly);
  topNavHelper.click();

  showMsg((files.length ? 'ดาวน์โหลดรูป ' + files.length + ' รูปลงเครื่องแล้ว + ' : '') + 'เปิด LINE พร้อมข้อความสรุปให้แล้วครับ' + (diagReason ? ' [เหตุผล: ' + diagReason + ']' : ''), true);
}
document.getElementById('lineShareBtn').addEventListener('click', () => { shareToLine(); });

// ---------- บันทึกรถเข้า ----------
document.getElementById('inImgsWrap').innerHTML = [0,1,2].map(i => shotSlotHTML(`gatein_${i}`)).join('');
setupCaptureSlots('gatein', 3);

const inForm = document.getElementById('inForm');
const inBtn = document.getElementById('inBtn');
document.getElementById('status').addEventListener('change', (e) => {
  inBtn.textContent = (e.target.value === 'ออกจากโรงบรรจุ') ? 'ดำเนินการเสร็จ' : 'บันทึกเวลาเข้า';
});

inForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  if(!capturesComplete('gatein')){
    showMsg('กรุณาถ่ายรูปให้ครบ 3 รูปตอนรถเข้า', false);
    return;
  }
  const truckType = document.getElementById('truckType').value;
  const plateNo = document.getElementById('plateNo').value;
  const roundNo = document.getElementById('roundNo').value;
  const status = document.getElementById('status').value;
  const payload = {
    form: 'gateIn',
    truckType: truckType,
    plateNo: plateNo,
    roundNo: roundNo,
    status: status,
    remark: document.getElementById('remark').value,
    inImg1: captureImages['gatein'][0],
    inImg2: captureImages['gatein'][1],
    inImg3: captureImages['gatein'][2]
  };
  inBtn.disabled = true;
  inBtn.textContent = 'กำลังบันทึก…';
  try{
    const res = await fetch(GAS_URL, { method:'POST', body: JSON.stringify(payload) });
    const json = await res.json();
    if(json && json.status === 'ok'){
      const isExitOnly = json.isExitOnly;
      showMsg((isExitOnly ? 'บันทึกเวลาออกสำเร็จ (' + json.timeOut : 'บันทึกเวลาเข้าสำเร็จ (' + json.timeIn) + ') ✓', true);
      const localImgs = captureImages['gatein'].filter(x => x && x.indexOf('data:') === 0);
      inForm.reset();
      document.getElementById('roundNo').value = 1;
      [0,1,2].forEach(i => {
        const id = `gatein_${i}`;
        captureImages['gatein'][i] = null;
        const shot = document.getElementById(`shot_${id}`);
        shot.classList.remove('filled');
        const img = shot.querySelector('img'); if(img) img.remove();
        const clr = shot.querySelector('.clear'); if(clr) clr.remove();
      });
      loadOpenList();
      showSummary(isExitOnly ? 'บันทึกรถออกสำเร็จ' : 'บันทึกรถเข้าสำเร็จ', [
        ['วันที่', json.date], isExitOnly ? ['เวลาออก', json.timeOut] : ['เวลาเข้า', json.timeIn],
        ['ทะเบียนรถ', json.plateNo], ['ประเภทรถ', json.truckType],
        ['รอบที่', json.roundNo], ['สถานะรถ', json.statusText]
      ].concat(json.remark ? [['หมายเหตุ', json.remark]] : []), json.images, localImgs);
    } else {
      showMsg('บันทึกไม่สำเร็จ: ' + (json && json.message ? json.message : 'ไม่ทราบสาเหตุ'), false);
    }
  }catch(err){
    showMsg('เชื่อมต่อไม่สำเร็จ กรุณาลองใหม่', false);
  }finally{
    inBtn.disabled = false;
    inBtn.textContent = 'บันทึกเวลาเข้า';
  }
});

// ---------- รถที่อยู่ในโรงงาน ----------
const openListEl = document.getElementById('openList');
let setupDoneKeys = new Set();

async function loadOpenList(){
  openListEl.innerHTML = '<div class="empty-hint">กำลังโหลด…</div>';
  setupDoneKeys = new Set();
  try{
    const res = await fetch(GAS_URL + '?action=gateOpenList');
    const json = await res.json();
    const rows = (json && json.rows) || [];
    if(rows.length === 0){
      openListEl.innerHTML = '<div class="empty-hint">ไม่มีรถอยู่ในโรงงานตอนนี้</div>';
      return;
    }
    openListEl.innerHTML = rows.map(r => {
      const btnLabel = 'ดำเนินการเสร็จ', btnClass = 'out-btn', panelType = 'out';
      const key = `${panelType}_${r.rowId}`;
      const delayField = `<input type="text" class="delay-input" id="delay_${r.rowId}" placeholder="เหตุผลที่ล่าช้า (ถ้ามี)" style="margin-bottom:8px;">`;
      return `
      <div class="open-item">
        <div class="top"><span>${r.date || ''}</span><span>เข้า ${r.timeIn || ''}</span></div>
        <div class="plate">${r.plateNo || '-'} <span style="font-weight:600;color:var(--ink-soft);font-size:12px;">รอบ ${r.roundNo || '-'}</span></div>
        <div class="meta">${r.truckType || ''} · ${r.status || ''}</div>
        <button type="button" class="toggle-btn ${btnClass}" data-key="${key}" data-panel="${panelType}_${r.rowId}">${btnLabel}</button>
        <div class="capture-panel" id="panel_${panelType}_${r.rowId}">
          <div class="imgs3" id="imgs3_${key}">${[0,1,2].map(i => shotSlotHTML(`${key}_${i}`)).join('')}</div>
          ${delayField}
          <button type="button" class="confirm-btn" data-rowid="${r.rowId}" data-type="${panelType}">ยืนยัน${btnLabel}</button>
        </div>
      </div>`;
    }).join('');

    openListEl.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const panelId = 'panel_' + btn.dataset.panel;
        const panel = document.getElementById(panelId);
        const isOpening = !panel.classList.contains('show');
        panel.classList.toggle('show');
        if(isOpening && !setupDoneKeys.has(btn.dataset.key)){
          setupCaptureSlots(btn.dataset.key, 3);
          setupDoneKeys.add(btn.dataset.key);
        }
      });
    });
    openListEl.querySelectorAll('.confirm-btn').forEach(btn => {
      btn.addEventListener('click', () => recordGateOut(btn));
    });
  }catch(err){
    openListEl.innerHTML = '<div class="empty-hint">โหลดรายการไม่สำเร็จ</div>';
  }
}



async function recordGateOut(btn){
  const rowId = btn.dataset.rowid;
  const key = `out_${rowId}`;
  if(!capturesComplete(key)){
    showMsg('กรุณาถ่ายรูปให้ครบ 3 รูปตอนรถออก', false);
    return;
  }
  const delayInput = document.getElementById(`delay_${rowId}`);
  const delayReason = delayInput ? delayInput.value : '';
  btn.disabled = true;
  const original = btn.textContent;
  btn.textContent = 'กำลังบันทึก…';
  try{
    const res = await fetch(GAS_URL, {
      method:'POST',
      body: JSON.stringify({
        form: 'gateOut', rowId: rowId, delayReason: delayReason,
        outImg1: captureImages[key][0], outImg2: captureImages[key][1], outImg3: captureImages[key][2]
      })
    });
    const json = await res.json();
    if(json && json.status === 'ok'){
      showMsg('บันทึกเวลาออกสำเร็จ ใช้เวลา ' + json.duration + ' นาที ✓', true);
      const localImgs = captureImages[key].filter(x => x && x.indexOf('data:') === 0);
      loadOpenList();
      loadHistory();
      showSummary('รถออกจากโรงงานแล้ว', [
        ['วันที่', json.date], ['เวลาเข้า', json.timeIn], ['เวลาออก', json.timeOut],
        ['ระยะเวลา', json.duration + ' นาที'],
        ['ทะเบียนรถ', json.plateNo], ['ประเภทรถ', json.truckType],
        ['รอบที่', json.roundNo], ['สถานะรถ', json.statusText]
      ], json.images, localImgs);
    } else {
      showMsg('บันทึกไม่สำเร็จ: ' + (json && json.message ? json.message : 'ไม่ทราบสาเหตุ'), false);
      btn.disabled = false;
      btn.textContent = original;
    }
  }catch(err){
    showMsg('เชื่อมต่อไม่สำเร็จ กรุณาลองใหม่', false);
    btn.disabled = false;
    btn.textContent = original;
  }
}

document.getElementById('refreshOpenBtn').addEventListener('click', loadOpenList);
loadOpenList();
