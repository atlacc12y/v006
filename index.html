<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Gas reconciliation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800&family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2F4F7;
    --paper-2:#E6E9EE;
    --ink:#1F2937;
    --ink-soft:#64748B;
    --brass:#2F6FE0;
    --brass-dark:#1D4ED8;
    --green:#2E9C4C;
    --red:#DC3545;
    --line:#DFE3E8;
    --panel:#111827;
    --readout:#8AB4FF;
    --readout-dim:#4C6FA6;
    --radius:8px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--paper);
    background-image:
      linear-gradient(var(--paper-2) 1px, transparent 1px),
      linear-gradient(90deg, var(--paper-2) 1px, transparent 1px);
    background-size:22px 22px;
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  header{
    padding:22px 18px 14px 62px;
    display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
  }
    .topbar{
    background:var(--panel); color:#fff; display:flex; align-items:center; gap:12px;
    padding:12px 16px; position:sticky; top:0; z-index:40;
  }
  .topbar-logo{ height:26px; width:auto; display:block; }
  .topbar-title{
    font-family:'Archivo',sans-serif; font-weight:800; font-size:15px;
    letter-spacing:-.01em; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .menu-btn{
    width:34px; height:34px; border-radius:8px; border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.06); display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0;
  }
  .menu-btn svg{ width:18px; height:18px; stroke:#fff; }
  .sidebar-overlay{
    position:fixed; inset:0; background:rgba(10,14,20,.55); z-index:60;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .sidebar-overlay.show{ opacity:1; pointer-events:auto; }
  .sidebar{
    position:fixed; top:0; left:0; bottom:0; width:250px; max-width:78vw;
    background:var(--panel); z-index:70; transform:translateX(-100%);
    transition:transform .25s ease; box-shadow:3px 0 20px rgba(0,0,0,.35);
    display:flex; flex-direction:column;
  }
  .sidebar.show{ transform:translateX(0); }
  .sidebar-header{
    padding:22px 18px; display:flex; align-items:center; gap:10px;
    border-bottom:1px solid rgba(255,255,255,.08); position:relative;
  }
  .sidebar-header img{ height:30px; width:auto; display:block; }
  .sidebar-header span{
    color:#fff; font-family:'Archivo',sans-serif; font-weight:800; font-size:12.5px;
    letter-spacing:.02em; line-height:1.25;
  }
  .sidebar-nav{ padding:14px 12px; flex:1; overflow-y:auto; }
  .sidebar a{
    display:block; padding:12px 12px; border-radius:8px; margin-bottom:4px;
    font-family:'Inter',sans-serif; font-weight:600; font-size:14.5px;
    color:rgba(255,255,255,.72); text-decoration:none; border-left:3px solid transparent;
  }
  .sidebar a.active{
    background:rgba(255,255,255,.08); color:#fff; border-left:3px solid var(--brass);
    font-weight:700;
  }
  .sidebar a:not(.active):active{ background:rgba(255,255,255,.05); }
  .sidebar-close{
    position:absolute; top:18px; right:14px; width:26px; height:26px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    color:rgba(255,255,255,.6); font-size:17px;
  }
  .back-link{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--brass-dark);
    text-decoration:none; font-weight:600; white-space:nowrap;
  }
  header .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--brass-dark); font-weight:600;
  }
  header h1{
    font-family:'Archivo',sans-serif; font-weight:800;
    font-size:26px; margin:4px 0 0; letter-spacing:-.01em;
  }

  main{ padding:0 14px; max-width:520px; margin:0 auto; }

  .card{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:14px;
    box-shadow:0 1px 0 rgba(27,36,29,.03);
  }
  .card h2{
    font-family:'Archivo',sans-serif; font-size:13px; font-weight:800;
    text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft);
    margin:0 0 12px;
  }

  .field{ margin-bottom:12px; }
  .field:last-child{ margin-bottom:0; }
  .field label{
    display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft);
    margin-bottom:5px;
  }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  input[type=date], input[type=number]{
    width:100%; padding:12px 12px; border:1.5px solid var(--line);
    border-radius:10px; font-size:16px; font-family:'IBM Plex Mono',monospace;
    background:#FBFBF9; color:var(--ink);
  }
  input[type=date]:focus, input[type=number]:focus{
    outline:none; border-color:var(--brass);
  }

  /* Scale readout panel */
  .readout{
    background:var(--panel); border-radius:12px; padding:14px 16px;
    display:grid; grid-template-columns:1fr 1fr; gap:10px 16px;
    margin-top:4px;
  }
  .readout .cell{ min-width:0; }
  .readout .k{
    font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.1em;
    text-transform:uppercase; color:#94A3B8; margin-bottom:3px;
  }
  .readout .v{
    font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:20px;
    color:var(--readout);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .readout .v.total{ color:#F7D68A; font-size:22px; }
  .readout .v.gain{ color:#7FD79A; }
  .readout .v.loss{ color:#F09488; }
  .readout .full{ grid-column:1 / -1; border-top:1px solid #2A3648; padding-top:10px; margin-top:2px; }

  /* Image capture grid */
  .imgs{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .shot{
    position:relative; aspect-ratio:1/1; border-radius:10px; overflow:hidden;
    border:1.5px dashed var(--line); background:#FBFBF9;
    display:flex; align-items:center; justify-content:center;
  }
  .shot.filled{ border-style:solid; border-color:var(--brass); }
  .shot img{ width:100%; height:100%; object-fit:cover; display:block; }
  .shot input{ position:absolute; inset:0; opacity:0; cursor:pointer; }
  .shot .hint{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    color:var(--ink-soft); font-size:11px; font-weight:600;
    text-transform:uppercase; letter-spacing:.06em; pointer-events:none;
  }
  .shot .hint svg{ width:22px; height:22px; stroke:var(--brass-dark); }
  .shot .tag{
    position:absolute; top:6px; left:6px; background:rgba(27,36,29,.72);
    color:#fff; font-family:'IBM Plex Mono',monospace; font-size:10px;
    padding:2px 6px; border-radius:5px; pointer-events:none;
  }
  .shot .clear{
    position:absolute; top:6px; right:6px; width:22px; height:22px;
    background:rgba(27,36,29,.72); border-radius:50%; color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:14px;
    z-index:2;
  }

  button.submit{
    width:100%; padding:15px; border:none; border-radius:12px;
    background:var(--brass); color:#FFFFFF; font-family:'Archivo',sans-serif;
    font-weight:800; font-size:15px; letter-spacing:.02em; cursor:pointer;
    margin-top:4px;
  }
  button.submit:active{ background:var(--brass-dark); }
  button.submit:disabled{ background:#C7D1E0; color:#7C8AA0; }

  .msg{
    text-align:center; font-size:13px; font-weight:600; padding:10px;
    border-radius:10px; margin-bottom:14px; display:none;
  }
  .msg.show{ display:block; }
  .msg.ok{ background:#E4F1E7; color:var(--green); }
  .msg.err{ background:#F6E4E2; color:var(--red); }

  /* Recent entries */
  .entry{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 0; border-bottom:1px solid var(--line); font-size:13px;
  }
  .entry:last-child{ border-bottom:none; }
  .entry .d{ font-family:'IBM Plex Mono',monospace; color:var(--ink-soft); }
  .entry .g{ font-family:'IBM Plex Mono',monospace; font-weight:700; }
  .entry .g.pos{ color:var(--green); }
  .entry .g.neg{ color:var(--red); }
  .empty-hint{ color:var(--ink-soft); font-size:13px; text-align:center; padding:8px 0; }
  .refresh{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--brass-dark);
    background:none; border:none; float:right; cursor:pointer; font-weight:600;
  }
  .export-btn{
    width:100%; padding:12px; margin-top:12px; border-radius:10px;
    border:1.5px solid var(--brass); background:#fff; color:var(--brass-dark);
    font-family:'Archivo',sans-serif; font-weight:800; font-size:13.5px;
    letter-spacing:.02em; cursor:pointer; display:flex; align-items:center;
    justify-content:center; gap:8px;
  }
  .export-btn:active{ background:#EAF0FE; }
  .export-btn svg{ width:16px; height:16px; stroke:var(--brass-dark); }
  .export-btn:disabled{ opacity:.6; }
</style>
</head>

<main>

      <div class="field">
        <label for="lms">LMS <span style="font-weight:500; text-transform:none; color:var(--ink-soft);">(กรอกภายหลังได้)</span></label>

    <div class="card">

<script>
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sidebarClose = document.getElementById('sidebarClose');
function openSidebar(){ sidebar.classList.add('show'); sidebarOverlay.classList.add('show'); }
function closeSidebar(){ sidebar.classList.remove('show'); sidebarOverlay.classList.remove('show'); }
menuBtn.addEventListener('click', openSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);
sidebarClose.addEventListener('click', closeSidebar);

const GAS_URL = "https://script.google.com/macros/s/AKfycbzFwNJc2PqCmZwNLBRo5guB1KUxsS4GFEttPNuSGMvDISZg6hNAumQaJO-1SneZlOCR6g/exec";
const RATIO = 8949;
const DIVISOR = 1.85;

// ---------- setup date default ----------
document.getElementById('date').valueAsDate = new Date();

// ---------- live calculations ----------
const bult1 = document.getElementById('bult1');
const bult2 = document.getElementById('bult2');
const lms   = document.getElementById('lms');
const w1El = document.getElementById('w1');
const w2El = document.getElementById('w2');
const wtEl = document.getElementById('wt');
const glEl = document.getElementById('gl');

function fmt(n){ return (isFinite(n) ? n : 0).toFixed(2); }

function recalc(){
  const b1 = parseFloat(bult1.value) || 0;
  const b2 = parseFloat(bult2.value) || 0;
  const hasLms = lms.value !== '';
  const l  = parseFloat(lms.value) || 0;
  const weight1 = ((b1/100)*RATIO)/DIVISOR;
  const weight2 = ((b2/100)*RATIO)/DIVISOR;
  const total = weight1 + weight2;
  const gainLoss = hasLms ? (total - l) : null;

  w1El.textContent = fmt(weight1);
  w2El.textContent = fmt(weight2);
  wtEl.textContent = fmt(total);
  glEl.textContent = hasLms ? fmt(gainLoss) : 'รอกรอก LMS';
  glEl.className = 'v gain ' + (!hasLms ? '' : (gainLoss >= 0 ? 'gain' : 'loss'));

  return { weight1, weight2, total, gainLoss, hasLms };
}
[bult1, bult2, lms].forEach(el => el.addEventListener('input', recalc));
recalc();

// ---------- image capture slots ----------
const imgsWrap = document.getElementById('imgs');
const imageData = [null, null, null, null];

function slotHTML(i){
  return `
  <div class="shot" id="shot${i}">
    <span class="tag">Image ${i+1}</span>
    <input type="file" accept="image/*" capture="environment" id="file${i}">
    <div class="hint" id="hint${i}">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a2 2 0 0 1 2-2h1.2a2 2 0 0 0 1.66-.9l.7-1.1A2 2 0 0 1 11.2 3h1.6a2 2 0 0 1 1.64.9l.7 1.1a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8Z"/><circle cx="12" cy="13" r="3.2"/></svg>
      <span>ถ่ายรูป</span>
    </div>
  </div>`;
}
for(let i=0;i<4;i++){ imgsWrap.insertAdjacentHTML('beforeend', slotHTML(i)); }

function resizeImage(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim){ height *= maxDim/width; width = maxDim; }
        else if (height > maxDim){ width *= maxDim/height; height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function setShotFilled(i, src){
  imageData[i] = src;
  const shot = document.getElementById(`shot${i}`);
  const fileInput = document.getElementById(`file${i}`);
  shot.classList.add('filled');
  let img = shot.querySelector('img');
  if(!img){
    img = document.createElement('img');
    shot.insertBefore(img, shot.querySelector('.tag'));
  }
  img.src = src;
  if(!shot.querySelector('.clear')){
    const clr = document.createElement('div');
    clr.className = 'clear';
    clr.textContent = '✕';
    clr.addEventListener('click', (ev) => {
      ev.preventDefault(); ev.stopPropagation();
      imageData[i] = null;
      shot.classList.remove('filled');
      const im = shot.querySelector('img'); if(im) im.remove();
      clr.remove();
      fileInput.value = '';
    });
    shot.appendChild(clr);
  }
}

function clearShot(i){
  imageData[i] = null;
  const shot = document.getElementById(`shot${i}`);
  const fileInput = document.getElementById(`file${i}`);
  shot.classList.remove('filled');
  const img = shot.querySelector('img'); if(img) img.remove();
  const clr = shot.querySelector('.clear'); if(clr) clr.remove();
  fileInput.value = '';
}

for(let i=0;i<4;i++){
  const fileInput = document.getElementById(`file${i}`);
  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const dataUrl = await resizeImage(file, 900, 0.75);
    setShotFilled(i, dataUrl);
  });
}

// ---------- load existing record for a chosen date (1 record per day) ----------
const dateInput = document.getElementById('date');
const dateStatus = document.getElementById('dateStatus');

function resetFieldsForNewDate(){
  bult1.value = '';
  bult2.value = '';
  lms.value = '';
  for(let i=0;i<4;i++) clearShot(i);
  recalc();
}

async function loadExistingForDate(){
  const d = dateInput.value;
  if(!d) return;
  dateStatus.style.display = 'block';
  dateStatus.style.color = 'var(--ink-soft)';
  dateStatus.textContent = 'กำลังตรวจสอบข้อมูล…';
  try{
    const res = await fetch(GAS_URL + '?action=get&date=' + encodeURIComponent(d));
    const json = await res.json();
    if(json && json.found){
      dateStatus.style.color = 'var(--brass-dark)';
      dateStatus.textContent = 'พบข้อมูลของวันนี้แล้ว — กำลังแก้ไขข้อมูลเดิม';
      bult1.value = json.bult1;
      bult2.value = json.bult2;
      lms.value = json.lms;
      for(let i=0;i<4;i++) clearShot(i);
      const imgs = [json.image1, json.image2, json.image3, json.image4];
      imgs.forEach((url,i) => { if(url) setShotFilled(i, url); });
      recalc();
    } else {
      dateStatus.style.display = 'none';
      resetFieldsForNewDate();
    }
  }catch(err){
    dateStatus.style.color = 'var(--red)';
    dateStatus.textContent = 'ตรวจสอบข้อมูลเดิมไม่สำเร็จ';
  }
}
dateInput.addEventListener('change', loadExistingForDate);
loadExistingForDate(); // เช็คทันทีสำหรับวันที่ตั้งต้น (วันนี้)

// ---------- messaging ----------
const msgEl = document.getElementById('msg');
function showMsg(text, ok){
  msgEl.textContent = text;
  msgEl.className = 'msg show ' + (ok ? 'ok' : 'err');
  setTimeout(()=>{ msgEl.className = 'msg'; }, 4000);
}

// ---------- submit ----------
const form = document.getElementById('form');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  if(imageData.some(x => !x)){
    showMsg('กรุณาถ่ายรูปให้ครบทั้ง 4 รูปก่อนบันทึก', false);
    return;
  }

  const calc = recalc();
  const payload = {
    date: document.getElementById('date').value,
    bult1: parseFloat(bult1.value) || 0,
    bult2: parseFloat(bult2.value) || 0,
    weight1: calc.weight1,
    weight2: calc.weight2,
    total: calc.total,
    lms: lms.value === '' ? '' : parseFloat(lms.value),
    gainLoss: calc.gainLoss,
    image1: imageData[0] || '',
    image2: imageData[1] || '',
    image3: imageData[2] || '',
    image4: imageData[3] || ''
  };

  submitBtn.disabled = true;
  submitBtn.textContent = 'กำลังบันทึก…';
  try{
    const res = await fetch(GAS_URL, { method:'POST', body: JSON.stringify(payload) });
    const json = await res.json();
    if(json && json.status === 'ok'){
      showMsg(json.mode === 'updated' ? 'แก้ไขข้อมูลของวันนี้สำเร็จ ✓' : 'บันทึกข้อมูลสำเร็จ ✓', true);
      loadEntries();
      loadExistingForDate(); // รีเฟรชสถานะ + ดึงลิงก์รูปที่อัปโหลดจริงกลับมาแสดง
    } else {
      showMsg('บันทึกไม่สำเร็จ: ' + (json && json.message ? json.message : 'ไม่ทราบสาเหตุ'), false);
    }
  }catch(err){
    showMsg('เชื่อมต่อไม่สำเร็จ กรุณาลองใหม่', false);
  }finally{
    submitBtn.disabled = false;
    submitBtn.textContent = 'บันทึกข้อมูล';
  }
});

// ---------- recent entries ----------
const entriesEl = document.getElementById('entries');
async function loadEntries(){
  entriesEl.innerHTML = '<div class="empty-hint">กำลังโหลด…</div>';
  try{
    const res = await fetch(GAS_URL + '?action=list&limit=8');
    const json = await res.json();
    const rows = (json && json.rows) || [];
    if(rows.length === 0){
      entriesEl.innerHTML = '<div class="empty-hint">ยังไม่มีข้อมูล</div>';
      return;
    }
    entriesEl.innerHTML = rows.map(r => `
      <div class="entry" style="flex-direction:column; align-items:stretch; gap:3px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span class="d">${r.date || ''}</span>
          <span>รวม ${fmt(r.total)} กก.</span>
          ${r.hasLms
            ? `<span class="g ${ (r.gainLoss>=0) ? 'pos':'neg' }">${r.gainLoss>=0?'+':''}${fmt(r.gainLoss)}</span>`
            : `<span class="g" style="color:var(--red);">— ยังไม่กรอก LMS</span>`}
        </div>
      </div>
    `).join('');
  }catch(err){
    entriesEl.innerHTML = '<div class="empty-hint">โหลดรายการไม่สำเร็จ</div>';
  }
}
document.getElementById('refreshBtn').addEventListener('click', loadEntries);
loadEntries();

// ---------- export to excel (ช่วงวันที่ที่เลือก) ----------
const exportStart = document.getElementById('exportStart');
const exportEnd = document.getElementById('exportEnd');
function setDefaultExportRange(){
  const now = new Date();
  const first = new Date(now.getFullYear(), now.getMonth(), 1);
  const last = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  exportStart.valueAsDate = first;
  exportEnd.valueAsDate = last;
}
setDefaultExportRange();

function resetExportRangeToToday(){
  const today = new Date();
  exportStart.valueAsDate = today;
  exportEnd.valueAsDate = today;
}

const exportBtn = document.getElementById('exportBtn');
exportBtn.addEventListener('click', async () => {
  const start = exportStart.value;
  const end = exportEnd.value;
  if(!start || !end){
    showMsg('กรุณาเลือกวันที่เริ่มต้นและสิ้นสุด', false);
    return;
  }
  exportBtn.disabled = true;
  const originalHTML = exportBtn.innerHTML;
  exportBtn.textContent = 'กำลังสร้างไฟล์… (อาจใช้เวลาสักครู่)';
  try {
    const res = await fetch(GAS_URL + '?action=exportRange&start=' + encodeURIComponent(start) + '&end=' + encodeURIComponent(end));
    const json = await res.json();
    if(json && json.status === 'ok' && json.data){
      const byteChars = atob(json.data);
      const byteNumbers = new Array(byteChars.length);
      for(let i=0;i<byteChars.length;i++) byteNumbers[i] = byteChars.charCodeAt(i);
      const byteArray = new Uint8Array(byteNumbers);
      const blob = new Blob([byteArray], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = json.filename || 'gas_reconciliation_export.xlsx';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      resetExportRangeToToday(); // รีเซ็ตช่วงวันที่กลับเป็นวันปัจจุบันหลัง Export สำเร็จ
    } else {
      showMsg('Export ไม่สำเร็จ: ' + (json && json.message ? json.message : 'ไม่ทราบสาเหตุ'), false);
    }
  } catch (err) {
    showMsg('Export ไม่สำเร็จ กรุณาลองใหม่', false);
  } finally {
    exportBtn.disabled = false;
    exportBtn.innerHTML = originalHTML;
  }
});
</script>
